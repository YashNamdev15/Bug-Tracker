<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>

/* ===== GLOBAL BACKGROUND ===== */
body{
    margin:0;
    font-family:system-ui;
    background:#FFFFF0;
    color:#2f2f2f;
}

/* ===== MAIN AREA ===== */
.profile-container{
    padding:45px;
}

/* ===== PROFILE CARD ===== */
.profile-card{
    max-width:900px;
    margin:auto;
    background:#DBE4C9;
    border-radius:18px;
    padding:40px;
    box-shadow:0 8px 18px rgba(0,0,0,.08);
}

/* ===== HEADER ===== */
.profile-header{
    text-align:center;
    margin-bottom:35px;
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#FFFFF0;
    color:#2f2f2f;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    font-weight:600;
    margin:auto;
    box-shadow:0 4px 10px rgba(0,0,0,.12);
}

.profile-header h2{
    margin:14px 0 6px;
    font-size:24px;
}

.profile-header p{
    color:#5f6b55;
    margin:0;
}

/* ===== STATS ===== */
.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:35px;
}

.stat{
    background:#FFFFF0;
    padding:20px;
    border-radius:14px;
    box-shadow:0 4px 10px rgba(0,0,0,.06);
    transition:.25s;
}

.stat:hover{
    transform:translateY(-3px);
}

.stat p{
    margin:0;
    color:#6b7280;
    font-size:14px;
}

.stat h3{
    margin-top:8px;
    font-size:26px;
}

/* ===== FORM ===== */
.form-group{
    margin-bottom:20px;
}

.form-group label{
    font-weight:600;
    margin-bottom:6px;
    display:block;
}

.form-group input{
    width:100%;
    padding:13px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,.15);
    background:#FFFFF0;
    font-size:14px;
    transition:.2s;
}

.form-group input:focus{
    outline:none;
    border-color:#aab89a;
    box-shadow:0 0 0 3px rgba(219,228,201,.6);
}

/* ===== BUTTONS ===== */
.actions{
    margin-top:30px;
    display:flex;
    gap:15px;
}

.btn{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

/* SAVE BUTTON */
.save{
    background:#FFFFF0;
    color:#2f2f2f;
    box-shadow:0 3px 8px rgba(0,0,0,.1);
}

.save:hover{
    transform:translateY(-2px);
    background:#f3f3dc;
}

/* LOGOUT BUTTON */
.logout{
    background:#2f2f2f;
    color:#FFFFF0;
}

.logout:hover{
    opacity:.9;
}

/* ===== TOP BAR ===== */
.top-bar{
    padding:20px 45px 0;
}

/* BACK BUTTON */
.back-btn{
    background:#DBE4C9;
    border:none;
    padding:10px 18px;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    color:#2f2f2f;
    box-shadow:0 3px 8px rgba(0,0,0,.08);
    transition:.2s;
}

.back-btn:hover{
    background:#cfdab5;
    transform:translateX(-3px);
}
</style>
</head>

<body>
<!-- BACK BUTTON -->
<div class="top-bar">
    <button class="back-btn" onclick="goBack()">← Back</button>
</div>
<div class="profile-container">

<div class="profile-card">

    <!-- HEADER -->
    <div class="profile-header">
        <div class="avatar" id="avatar">U</div>
        <h2 id="name">User</h2>
        <p id="email">email@email.com</p>
    </div>

    <!-- STATS -->
    <div class="stats">
        <div class="stat"><p>Total Tickets</p><h3 id="total">0</h3></div>
        <div class="stat"><p>Open</p><h3 id="open">0</h3></div>
        <div class="stat"><p>In Progress</p><h3 id="progress">0</h3></div>
        <div class="stat"><p>Completed</p><h3 id="done">0</h3></div>
    </div>

    <!-- FORM -->
    <div class="form-group">
        <label>Name</label>
        <input id="nameInput" type="text">
    </div>

    <div class="form-group">
        <label>Email</label>
        <input id="emailInput" type="email" disabled>
    </div>

    <div class="actions">
        <button class="btn save" onclick="saveProfile()">Save Changes</button>
        <button class="btn logout" onclick="logout()">Logout</button>
    </div>

</div>
</div>

<script>

/* ===== LOAD USER ===== */
const user = JSON.parse(localStorage.getItem("loggedUser"));

if(!user){
    window.location.href="login.html";
}

document.getElementById("name").innerText = user.name;
document.getElementById("email").innerText = user.email;
document.getElementById("nameInput").value = user.name;
document.getElementById("emailInput").value = user.email;
document.getElementById("avatar").innerText =
    user.name.charAt(0).toUpperCase();

/* ===== SAVE ===== */
function saveProfile(){
    user.name = document.getElementById("nameInput").value;
    localStorage.setItem("loggedUser", JSON.stringify(user));
    alert("Profile Updated ✅");
}

/* ===== LOGOUT ===== */
function logout(){
    localStorage.removeItem("loggedUser");
    window.location.href="login.html";
}

/* ===== STATS (from tickets) ===== */
const tickets =
JSON.parse(localStorage.getItem("tickets")) || [];

let total=0,open=0,progress=0,done=0;

tickets.forEach(t=>{
    if(t.assignedTo===user.name){
        total++;
        if(t.status==="OPEN") open++;
        else if(t.status==="IN_PROGRESS") progress++;
        else if(t.status==="DONE") done++;
    }
});

document.getElementById("total").innerText=total;
document.getElementById("open").innerText=open;
document.getElementById("progress").innerText=progress;
document.getElementById("done").innerText=done;

function goBack(){
    window.location.href = "project_dashboard.html";
}

</script>

</body>
</html>
